<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة طلبات الكاش</title>
  <style>
    :root {
      --yellow: #ffc107;
      --orange: #ff6b00;
      --black: #141414;
      --panel: #202020;
      --panel-2: #292929;
      --text: #f7f7f7;
      --muted: #b8b8b8;
      --border: #3a3a3a;
      --danger: #ff5b4f;
      --green: #22c55e;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--black);
      color: var(--text);
      font-family: Tahoma, Arial, sans-serif;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      background: #0f0f0f;
      border-bottom: 3px solid var(--orange);
    }

    h1 {
      margin: 0;
      color: var(--yellow);
      font-size: 1.2rem;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: .92rem;
      white-space: nowrap;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(255, 91, 79, .12);
    }

    .dot.online {
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, .12);
    }

    .wrap {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .setup {
      display: grid;
      gap: 12px;
      max-width: 560px;
      margin: 40px auto;
      padding: 18px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .setup h2 {
      margin: 0;
      color: var(--yellow);
      font-size: 1.1rem;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: var(--muted);
      font-size: .9rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #111;
      color: var(--text);
      font: inherit;
      padding: 11px 12px;
      outline: none;
    }

    button {
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 800;
      padding: 11px 14px;
      cursor: pointer;
    }

    .primary {
      background: var(--yellow);
      color: #111;
    }

    .secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .hidden { display: none !important; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
    }

    .alert {
      display: none;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 9px;
      background: rgba(255, 91, 79, .13);
      border: 1px solid rgba(255, 91, 79, .45);
      color: #ffd7d3;
      font-weight: 800;
    }

    .alert.show {
      display: block;
    }

    .empty {
      padding: 40px 14px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
      border: 1px dashed var(--border);
      border-radius: 10px;
    }

    .orders {
      display: grid;
      gap: 14px;
    }

    .order {
      background: var(--panel);
      border: 1px solid var(--border);
      border-right: 5px solid var(--yellow);
      border-radius: 10px;
      overflow: hidden;
    }

    .order-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      background: #171717;
      border-bottom: 1px solid var(--border);
    }

    .order-title {
      display: grid;
      gap: 4px;
    }

    .customer {
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--yellow);
    }

    .time {
      color: var(--muted);
      font-size: .85rem;
    }

    .order-body {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .item {
      display: grid;
      gap: 5px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .item:last-child {
      border-bottom: 0;
    }

    .item-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-weight: 800;
    }

    .note {
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.6;
    }

    .total {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-top: 8px;
      color: var(--yellow);
      font-size: 1.05rem;
      font-weight: 900;
    }

    .accept {
      background: var(--green);
      color: #07130b;
      min-width: 132px;
    }

    .credit {
      position: fixed;
      left: 12px;
      bottom: 10px;
      z-index: 20;
      color: rgba(247, 247, 247, .54);
      font-size: .78rem;
      background: rgba(15, 15, 15, .72);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 8px;
      padding: 7px 9px;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }

    @media (max-width: 640px) {
      .topbar,
      .toolbar,
      .order-head,
      .item-main {
        align-items: stretch;
        flex-direction: column;
      }

      .accept {
        width: 100%;
      }

      .credit {
        position: static;
        margin: 18px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>لوحة طلبات الكاش</h1>
    <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">غير متصل</span></div>
  </header>

  <main class="wrap">
    <section class="setup" id="setupPanel">
      <h2>تشغيل لوحة الكاش</h2>
      <div class="field">
        <label for="secretInput">مفتاح الكاش</label>
        <input id="secretInput" type="password" autocomplete="off" placeholder="اكتب CASHIER_SECRET" />
      </div>
      <div class="alert" id="setupError"></div>
      <button class="primary" id="startBtn">تشغيل التنبيه واللوحة</button>
    </section>

    <section id="cashierPanel" class="hidden">
      <div class="toolbar">
        <strong id="summary">لا توجد طلبات جديدة</strong>
        <button class="secondary" id="changeSecretBtn">تغيير المفتاح</button>
      </div>
      <div class="alert" id="alarmBanner">يوجد طلب جديد بانتظار القبول</div>
      <div class="orders" id="orders"></div>
    </section>
  </main>
  <div class="credit">تم تطوير هذا النظام بواسطة خالد حسين الحميدي</div>

  <script>
    (function(){
      var API_BASE = 'https://albaik-worker.yayaalbaik.workers.dev';
      var POLL_MS = 2000;
      var secretKey = 'albaik_cashier_secret';
      var secret = '';
      var pollTimer = null;
      var audioContext = null;
      var alarmTimer = null;
      var knownOrderIds = new Set();

      var setupPanel = document.getElementById('setupPanel');
      var cashierPanel = document.getElementById('cashierPanel');
      var secretInput = document.getElementById('secretInput');
      var startBtn = document.getElementById('startBtn');
      var changeSecretBtn = document.getElementById('changeSecretBtn');
      var statusDot = document.getElementById('statusDot');
      var statusText = document.getElementById('statusText');
      var summary = document.getElementById('summary');
      var ordersBox = document.getElementById('orders');
      var alarmBanner = document.getElementById('alarmBanner');
      var setupError = document.getElementById('setupError');

      function esc(value){
        return String(value || '').replace(/[&<>"']/g,function(c){
          return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
        });
      }

      function price(value){
        return Number(value || 0).toFixed(2).replace(/\.00$/,'');
      }

      function setOnline(isOnline, text){
        statusDot.classList.toggle('online', isOnline);
        statusText.textContent = text;
      }

      function ensureAudio(){
        if(!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if(audioContext.state === 'suspended') audioContext.resume();
      }

      function beep(){
        if(!audioContext) return;
        var osc = audioContext.createOscillator();
        var gain = audioContext.createGain();
        osc.type = 'square';
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.0001, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.18, audioContext.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.38);
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.start();
        osc.stop(audioContext.currentTime + 0.42);
      }

      function startAlarm(){
        alarmBanner.classList.add('show');
        document.title = 'طلب جديد - لوحة الكاش';
        if(alarmTimer) return;
        beep();
        alarmTimer = setInterval(beep, 1100);
      }

      function stopAlarm(){
        alarmBanner.classList.remove('show');
        document.title = 'لوحة طلبات الكاش';
        if(alarmTimer){
          clearInterval(alarmTimer);
          alarmTimer = null;
        }
      }

      function authHeaders(){
        return {
          'Authorization': 'Bearer ' + secret,
          'Content-Type': 'application/json'
        };
      }

      function showSetupError(message){
        setupError.textContent = message;
        setupError.classList.add('show');
      }

      function clearSetupError(){
        setupError.textContent = '';
        setupError.classList.remove('show');
      }

      async function loadOrders(){
        var response = await fetch(API_BASE + '/cashier/orders', {
          method: 'GET',
          headers: authHeaders(),
          cache: 'no-store'
        });
        var data = await response.json().catch(function(){ return {}; });
        if(!response.ok) throw new Error(response.status === 401 ? 'مفتاح الكاش غير صحيح.' : (data.message || 'تعذر جلب الطلبات'));
        return data.orders || [];
      }

      async function fetchOrders(){
        try{
          var orders = await loadOrders();
          setOnline(true, 'متصل');
          renderOrders(orders);
        }catch(error){
          setOnline(false, error.message || 'غير متصل');
        }
      }

      async function acceptOrder(orderId){
        try{
          var response = await fetch(API_BASE + '/cashier/accept', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({ order_id: orderId })
          });
          var data = await response.json().catch(function(){ return {}; });
          if(!response.ok) throw new Error(data.message || 'تعذر قبول الطلب');
          knownOrderIds.delete(orderId);
          await fetchOrders();
        }catch(error){
          alert(error.message || 'تعذر قبول الطلب');
        }
      }

      function renderOrders(orders){
        var count = orders.length;
        summary.textContent = count ? count + ' طلب جديد بانتظار القبول' : 'لا توجد طلبات جديدة';
        if(!count){
          stopAlarm();
          ordersBox.innerHTML = '<div class="empty">لا توجد طلبات جديدة حالياً</div>';
          return;
        }

        var hasNewArrival = orders.some(function(order){ return !knownOrderIds.has(order.id); });
        orders.forEach(function(order){ knownOrderIds.add(order.id); });
        if(hasNewArrival || count > 0) startAlarm();

        ordersBox.innerHTML = orders.map(function(order){
          var created = new Date(order.created_at).toLocaleString('ar-JO', { dateStyle: 'short', timeStyle: 'short' });
          var items = (order.items || []).map(function(item){
            return '<div class="item"><div class="item-main"><span>' + esc(item.quantity) + ' × ' + esc(item.name_ar) + '</span><span>' + price(item.line_total) + ' د.أ</span></div>' + (item.item_note ? '<div class="note">ملاحظة: ' + esc(item.item_note) + '</div>' : '') + '</div>';
          }).join('');
          return '<article class="order"><div class="order-head"><div class="order-title"><div class="customer">' + esc(order.customer_name) + '</div><div class="time">' + esc(created) + '</div></div><button class="accept" data-order-id="' + esc(order.id) + '">قبول الطلب</button></div><div class="order-body">' + items + (order.customer_note ? '<div class="note"><strong>ملاحظات الطلب:</strong> ' + esc(order.customer_note) + '</div>' : '') + '<div class="total"><span>المجموع</span><span>' + price(order.total) + ' د.أ</span></div></div></article>';
        }).join('');

        document.querySelectorAll('[data-order-id]').forEach(function(button){
          button.addEventListener('click', function(){ acceptOrder(button.getAttribute('data-order-id')); });
        });
      }

      async function startCashier(){
        clearSetupError();
        secret = secretInput.value.trim();
        if(!secret){
          showSetupError('يرجى كتابة مفتاح الكاش.');
          return;
        }

        startBtn.disabled = true;
        startBtn.textContent = 'جاري التحقق...';
        try{
          var orders = await loadOrders();
          localStorage.setItem(secretKey, secret);
          ensureAudio();
          setupPanel.classList.add('hidden');
          cashierPanel.classList.remove('hidden');
          setOnline(true, 'متصل');
          renderOrders(orders);
          if(pollTimer) clearInterval(pollTimer);
          pollTimer = setInterval(fetchOrders, POLL_MS);
        }catch(error){
          setOnline(false, 'غير متصل');
          showSetupError(error.message || 'تعذر تشغيل لوحة الكاش.');
        }finally{
          startBtn.disabled = false;
          startBtn.textContent = 'تشغيل التنبيه واللوحة';
        }
      }

      startBtn.addEventListener('click', startCashier);
      changeSecretBtn.addEventListener('click', function(){
        stopAlarm();
        if(pollTimer) clearInterval(pollTimer);
        cashierPanel.classList.add('hidden');
        setupPanel.classList.remove('hidden');
        secretInput.focus();
      });

      var savedSecret = localStorage.getItem(secretKey);
      if(savedSecret) secretInput.value = savedSecret;
    })();
  </script>
</body>
</html>
