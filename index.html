  <style>
    :root {
      --yellow: #FFC107;
      --orange: #FF6B00;
      --black: #1A1A1A;
      --dark: #111111;
      --card-bg: #1E1E1E;
      --text-light: #F5F5F5;
      --text-muted: #AAAAAA;
      --border: #2E2E2E;
      --font-ar: 'Cairo', sans-serif;
      --font-en: 'Montserrat', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--text-light);
      font-family: var(--font-ar);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body.lang-en {
      font-family: var(--font-en);
      direction: ltr;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      aspect-ratio: 940 / 350;
      max-height: 380px;
      overflow: hidden;
      background: #222;
    }

    .hero-bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.55) 100%);
    }

    /* ── LOGO ── */
    .logo-wrap {
      position: absolute;
      bottom: +30px;
      right: 50%;
      transform: translateX(50%);
      z-index: 10;
    }

    body.lang-en .logo-wrap {
      right: auto;
      left: 50%;
      transform: translateX(-50%);
    }

    .logo-wrap img {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--yellow);
      box-shadow: 0 4px 24px rgba(255,193,7,0.35);
      display: block;
      image-rendering: -webkit-optimize-contrast;
    }

    /* ── LANG TOGGLE ── */
    .lang-toggle {
      position: absolute;
      top: 16px;
      left: 20px;
      z-index: 20;
      background: rgba(0,0,0,0.55);
      border: 1.5px solid var(--yellow);
      color: var(--yellow);
      padding: 6px 18px;
      border-radius: 24px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      font-family: var(--font-en);
      letter-spacing: 0.04em;
      transition: background 0.2s, color 0.2s;
      backdrop-filter: blur(4px);
    }

    .lang-toggle:hover {
      background: var(--yellow);
      color: var(--black);
    }

    /* ── MAIN WRAPPER ── */
    .main-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }

    /* ── SPACER for logo ── */
    .logo-spacer { height: 72px; }

    /* ── NAV BAR ── */
    .section-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--black);
      border-bottom: 2.5px solid var(--orange);
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .section-nav::-webkit-scrollbar { display: none; }

    .nav-inner {
      display: flex;
      gap: 0;
      min-width: max-content;
      padding: 0 8px;
    }

    .nav-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 14px 20px;
      cursor: pointer;
      white-space: nowrap;
      position: relative;
      transition: color 0.2s;
      letter-spacing: 0.01em;
    }

    .nav-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 3px;
      background: var(--yellow);
      transform: scaleX(0);
      transition: transform 0.22s;
    }

    .nav-btn:hover { color: var(--text-light); }
    .nav-btn.active { color: var(--yellow); }
    .nav-btn.active::after { transform: scaleX(1); }

    /* ── SECTION TITLE ── */
    .section-title-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 40px 0 22px;
    }

    .section-title-bar .line {
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, var(--orange), transparent);
    }

    body.lang-en .section-title-bar .line {
      background: linear-gradient(90deg, transparent, var(--orange));
    }

    .section-title-bar .line.line-end {
      background: linear-gradient(90deg, transparent, var(--orange));
    }

    body.lang-en .section-title-bar .line.line-end {
      background: linear-gradient(90deg, var(--orange), transparent);
    }

    .section-title-bar h2 {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 900;
      color: var(--yellow);
      white-space: nowrap;
    }

    /* ── ITEMS GRID ── */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 18px;
    }

    /* ── ITEM CARD ── */
    .item-card {
      background: var(--card-bg);
      border-radius: 14px;
      overflow: hidden;
      border: 1.5px solid var(--border);
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .item-card:hover {
      transform: translateY(-4px);
      border-color: var(--orange);
      box-shadow: 0 8px 28px rgba(255,107,0,0.18);
    }

    .item-image {
      aspect-ratio: 4 / 3;
      background: #2a2a2a;
      overflow: hidden;
      flex-shrink: 0;
    }

    .item-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      image-rendering: -webkit-optimize-contrast;
      transition: transform 0.3s;
    }

    .item-card:hover .item-image img {
      transform: scale(1.04);
    }

    .item-info {
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .item-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-light);
      line-height: 1.4;
    }

    .item-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.5;
      flex: 1;
    }

    .item-price {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 1rem;
      font-weight: 900;
      color: var(--yellow);
      margin-top: 4px;
    }

    .item-price span.currency {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--orange);
      opacity: 0.9;
    }

    /* ── NO IMAGE PLACEHOLDER ── */
    .no-img {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #222 0%, #2a2a2a 100%);
      font-size: 2.5rem;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.88);
      align-items: center;
      justify-content: center;
      padding: 20px;
      cursor: zoom-out;
      backdrop-filter: blur(6px);
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.7);
      image-rendering: -webkit-optimize-contrast;
    }

    .lightbox-close {
      position: absolute;
      top: 18px;
      right: 22px;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      background: rgba(0,0,0,0.5);
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .lightbox-close:hover { background: var(--orange); }

    /* ── SECTION VISIBILITY ── */
    .menu-section { display: none; }
    .menu-section.active { display: block; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .hero { aspect-ratio: 16/9; max-height: 220px; }
      .logo-wrap img { width: 76px; height: 76px; }
      .logo-spacer { height: 56px; }
      .nav-btn { font-size: 0.8rem; padding: 12px 14px; }
      .items-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
      .item-name { font-size: 0.88rem; }
    }

    @media (min-width: 1100px) {
      .items-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
    }
  </style>

/* ── STATE ── */
let currentLang = 'ar';
let activeSection = menuData[0].id;

/* ── EMOJI FALLBACKS ── */
const sectionEmoji = {
  'shawarma-single': '🌯',
  'shawarma-family': '🫕',
  'broasted': '🍗',
  'grills': '🔥',
  'snacks': '🍟',
  'starters': '🥗',
  'sauces': '🥫',
  'drinks': '🥤'
};

/* ── RENDER NAV ── */
function renderNav() {
  const nav = document.getElementById('navInner');
  nav.innerHTML = menuData.map(sec => `
    <button class="nav-btn ${sec.id === activeSection ? 'active' : ''}"
      onclick="showSection('${sec.id}')">
      ${currentLang === 'ar' ? sec.name_ar : sec.name_en}
    </button>
  `).join('');
}

/* ── RENDER MENU ── */
function renderMenu() {
  const content = document.getElementById('menuContent');
  content.innerHTML = menuData.map(sec => `
    <section class="menu-section ${sec.id === activeSection ? 'active' : ''}" id="sec-${sec.id}">
      <div class="section-title-bar">
        <div class="line"></div>
        <h2>${currentLang === 'ar' ? sec.name_ar : sec.name_en}</h2>
        <div class="line line-end"></div>
      </div>
      <div class="items-grid">
        ${sec.items.map((item, i) => renderCard(item, i)).join('')}
      </div>
    </section>
  `).join('');
}

function renderCard(item, i) {
  const name = currentLang === 'ar' ? item.name_ar : item.name_en;
  const desc = currentLang === 'ar' ? item.desc_ar : item.desc_en;
  const currency = currentLang === 'ar' ? 'د.أ' : 'JOD';
  const imgHtml = item.img
    ? `<img src="${item.img}" alt="${name}" loading="lazy" decoding="async" onclick="openLightbox('${item.img}', '${name.replace(/'/g,"&#39;")}')" />`
    : `<div class="no-img" title="${name}">${sectionEmoji[item._section] || '🍽️'}</div>`;

  return `
    <div class="item-card">
      <div class="item-image">${imgHtml}</div>
      <div class="item-info">
        <div class="item-name">${name}</div>
        <div class="item-desc">${desc}</div>
        <div class="item-price">${item.price} <span class="currency">${currency}</span></div>
      </div>
    </div>
  `;
}

/* ── SECTION SWITCH ── */
function showSection(id) {
  activeSection = id;
  renderNav();
  renderMenu();
  // Scroll nav btn into view
  const activeBtn = document.querySelector('.nav-btn.active');
  if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

/* ── LANG TOGGLE ── */
function toggleLang() {
  currentLang = currentLang === 'ar' ? 'en' : 'ar';
  document.documentElement.lang = currentLang;
  document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.body.classList.toggle('lang-en', currentLang === 'en');
  document.getElementById('langBtn').textContent = currentLang === 'ar' ? 'EN' : 'ع';
  renderNav();
  renderMenu();
}

/* -- track menu event --*/
function trackMenuEvent(action, label = '') {
  if (typeof gtag !== 'undefined') {
    gtag('event', action, {
      item_name: label
    });
  }
}
/* ── LIGHTBOX ── */
function openLightbox(src, alt) {
  trackMenuEvent('click_image', alt);

  const lb = document.getElementById('lightbox');
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxImg').alt = alt;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = ''; } });

/* ── INIT ── */
renderNav();
renderMenu();
</script>

:50%;border:0;background:var(--yellow);color:var(--black);font-weight:900;cursor:pointer;font-size:1rem}.qty-value{min-width:24px;text-align:center;font-weight:900}.note-input,.order-input,.order-textarea{width:100%;border:1px solid var(--border);border-radius:10px;background:#151515;color:var(--text-light);font-family:inherit;font-size:.92rem;padding:10px 12px;outline:0}.note-input{margin-top:10px;grid-column:1/-1}.order-field{margin-bottom:14px}.order-field label{display:block;margin-bottom:7px;color:var(--text-muted);font-size:.86rem;font-weight:700}.order-textarea{min-height:86px;resize:vertical}.cart-total{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 0 6px;font-weight:900;color:var(--yellow);font-size:1.05rem}.order-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-top:14px}.primary-btn,.secondary-btn{border:0;border-radius:11px;font-family:inherit;font-weight:900;padding:12px 14px;cursor:pointer}.primary-btn{background:var(--yellow);color:var(--black)}.secondary-btn{background:#2a2a2a;color:var(--text-light);border:1px solid var(--border)}.primary-btn:disabled{opacity:.55;cursor:not-allowed}.review-list{display:grid;gap:10px;margin-bottom:16px}.review-row{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}.review-note{color:var(--text-muted);font-size:.82rem;margin-top:4px}.success-box{text-align:center;padding:18px 0 8px}.success-mark{width:58px;height:58px;margin:0 auto 14px;display:grid;place-items:center;border-radius:50%;background:var(--yellow);color:var(--black);font-size:2rem;font-weight:900}.error-text{display:none;color:#ffb4a8;background:rgba(255,107,0,.12);border:1px solid rgba(255,107,0,.35);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:.9rem}.error-text.show{display:block}body.modal-lock{overflow:hidden}@media(max-width:600px){.order-modal{padding:0;align-items:flex-end}.order-card{max-height:92vh;border-radius:18px 18px 0 0}.cart-bar{left:10px;right:10px;bottom:10px;border-radius:12px}.order-actions{grid-template-columns:1fr}}

<script>
(function(){
  var ORDER_ENDPOINT = 'https://albaik-worker.yayaalbaik.workers.dev/';
  var MAX_ITEM_QTY = 9;
  var cart = new Map();
  var productCatalog = new Map();
  var pendingOrderPayload = null;
  var confirmCountdownTimer = null;
  var confirmSecondsLeft = 8;

  function prepareMenuData(){
    menuData.forEach(function(section){
      section.items.forEach(function(item,index){
        item._section = section.id;
        item.id = item.id || (section.id + '-' + (index + 1));
        productCatalog.set(item.id,item);
      });
    });
  }
  function esc(v){return String(v || '').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function price(v){return Number(v || 0).toFixed(2).replace(/\.00$/,'');}
  function cur(){return currentLang === 'ar' ? 'د.أ' : 'JOD';}
  function nameOf(item){return item.name_ar || item.name_en;}
  function descOf(item){return currentLang === 'ar' ? item.desc_ar : item.desc_en;}

  window.renderCard = function(item){
    var name = nameOf(item);
    var desc = descOf(item);
    var imgHtml = item.img ? '<img src="'+item.img+'" alt="'+esc(name)+'" loading="lazy" decoding="async" onclick="openLightbox(\''+item.img+'\', \''+esc(name)+'\')" />' : '<div class="no-img" title="'+esc(name)+'">🍽️</div>';
    return '<div class="item-card"><div class="item-image">'+imgHtml+'</div><div class="item-info"><div class="item-name">'+esc(name)+'</div><div class="item-desc">'+esc(desc)+'</div><div class="item-price">'+price(item.price)+' <span class="currency">'+cur()+'</span></div><button class="add-btn" onclick="addToCart(\''+item.id+'\')">'+(currentLang === 'ar' ? 'إضافة للسلة' : 'Add to cart')+'</button></div></div>';
  };

  window.addToCart = function(productId){
    var item = productCatalog.get(productId);
    if(!item) return;
    var existing = cart.get(productId) || {productId:productId,quantity:0,note:''};
    existing.quantity = Math.min(MAX_ITEM_QTY, existing.quantity + 1);
    cart.set(productId, existing);
    renderCart();
    if(typeof trackMenuEvent === 'function') trackMenuEvent('add_to_cart', nameOf(item));
  };
  window.changeQty = function(productId,delta){
    var entry = cart.get(productId); if(!entry) return;
    entry.quantity += delta;
    if(entry.quantity <= 0) cart.delete(productId); else entry.quantity = Math.min(MAX_ITEM_QTY, entry.quantity);
    renderCart();
  };
  window.updateItemNote = function(productId,value){var entry = cart.get(productId); if(entry) entry.note = String(value || '').slice(0,120);};
  function entries(){return Array.from(cart.values()).map(function(e){var p=productCatalog.get(e.productId);return p ? {productId:e.productId,quantity:e.quantity,note:e.note,product:p} : null;}).filter(Boolean);}
  function totals(){var es=entries();return {count:es.reduce(function(s,e){return s+e.quantity;},0),total:es.reduce(function(s,e){return s+(e.quantity*Number(e.product.price||0));},0)};}
  function setText(id,text){var el=document.getElementById(id); if(el) el.textContent=text;}

  window.renderCart = function(){
    var es=entries(); var t=totals(); var currency=cur(); var bar=document.getElementById('cartBar');
    if(!bar) return;
    bar.classList.toggle('show', t.count > 0);
    setText('cartBarLabel', currentLang === 'ar' ? 'السلة - '+t.count+' صنف' : 'Cart - '+t.count+' item'+(t.count===1?'':'s'));
    setText('cartBarTotal', price(t.total)+' '+currency);
    setText('cartTitle', currentLang === 'ar' ? 'السلة' : 'Cart');
    setText('cartTotalLabel', currentLang === 'ar' ? 'المجموع' : 'Total');
    setText('continueBtn', currentLang === 'ar' ? 'الرجوع' : 'Back');
    setText('reviewBtn', currentLang === 'ar' ? 'استكمال الطلب' : 'Complete order');
    setText('cartTotalValue', price(t.total)+' '+currency);
    document.getElementById('reviewBtn').disabled = t.count === 0;
    var box=document.getElementById('cartItems');
    if(!es.length){box.innerHTML='<div class="cart-empty">'+(currentLang === 'ar' ? 'السلة فارغة' : 'Your cart is empty')+'</div>';return;}
    box.innerHTML=es.map(function(e){var item=e.product;var line=Number(item.price||0)*e.quantity;return '<div class="cart-item"><div><div class="cart-name">'+esc(nameOf(item))+'</div><div class="cart-meta">'+price(item.price)+' '+currency+' × '+e.quantity+' = '+price(line)+' '+currency+'</div></div><div class="qty-controls"><button class="qty-btn" onclick="changeQty(\''+e.productId+'\',-1)">−</button><span class="qty-value">'+e.quantity+'</span><button class="qty-btn" onclick="changeQty(\''+e.productId+'\',1)">+</button></div><input class="note-input" maxlength="120" value="'+esc(e.note)+'" oninput="updateItemNote(\''+e.productId+'\',this.value)" placeholder="'+(currentLang === 'ar' ? 'ملاحظة للصنف مثل: بدون مخلل' : 'Item note, e.g. no pickles')+'"></div>';}).join('');
  };

  function openOrderModal(id){document.querySelectorAll('.order-modal.open').forEach(function(m){m.classList.remove('open');});document.getElementById(id).classList.add('open');document.body.classList.add('modal-lock');}
  window.closeOrderModal=function(id){document.getElementById(id).classList.remove('open');if(!document.querySelector('.order-modal.open')) document.body.classList.remove('modal-lock');};
  window.closeOrderBackdrop=function(event,id){if(event.target.id===id) closeOrderModal(id);};
  window.openCart=function(){renderCart();openOrderModal('cartModal');};
  window.openReview=function(){if(!entries().length) return;renderReview();openOrderModal('reviewModal');};

  function renderReview(){
    var es=entries(); var t=totals(); var currency=cur();
    setText('reviewTitle', currentLang === 'ar' ? 'استكمال الطلب' : 'Complete order');
    setText('customerNameLabel', currentLang === 'ar' ? 'الاسم' : 'Name');
    setText('customerNoteLabel', currentLang === 'ar' ? 'ملاحظات عامة' : 'General notes');
    setText('reviewTotalLabel', currentLang === 'ar' ? 'المجموع' : 'Total');
    setText('backToCartBtn', currentLang === 'ar' ? 'رجوع للسلة' : 'Back to cart');
    setText('submitOrderBtn', currentLang === 'ar' ? 'تأكيد وإرسال الطلب' : 'Confirm and send');
    setText('reviewTotalValue', price(t.total)+' '+currency);
    document.getElementById('customerName').placeholder = currentLang === 'ar' ? 'اكتب اسمك' : 'Your name';
    document.getElementById('customerNote').placeholder = currentLang === 'ar' ? 'مثال: بدون بصل في جميع الساندويشات' : 'Example: no onions in all sandwiches';
    document.getElementById('reviewItems').innerHTML=es.map(function(e){var item=e.product;var line=Number(item.price||0)*e.quantity;return '<div class="review-row"><div><strong>'+e.quantity+' × '+esc(nameOf(item))+'</strong>'+(e.note?'<div class="review-note">'+esc(e.note)+'</div>':'')+'</div><strong>'+price(line)+' '+currency+'</strong></div>';}).join('');
  }
  function showErr(msg){var el=document.getElementById('orderError');el.textContent=msg;el.classList.add('show');}
  function clearErr(){var el=document.getElementById('orderError');el.textContent='';el.classList.remove('show');}

  window.submitOrder=function(){
    clearErr(); var es=entries(); var customerName=document.getElementById('customerName').value.trim(); var customerNote=document.getElementById('customerNote').value.trim();
    if(!es.length) return showErr(currentLang === 'ar' ? '????? ?????.' : 'Your cart is empty.');
    if(!customerName) return showErr(currentLang === 'ar' ? '???? ????? ?????.' : 'Please enter your name.');
    pendingOrderPayload={customer_name:customerName,customer_note:customerNote,language:currentLang,items:es.map(function(e){return {product_id:e.productId,quantity:e.quantity,item_note:String(e.note||'').trim()};})};
    renderConfirmModal();
    openOrderModal('confirmModal');
    startConfirmCountdown();
  };

  function renderConfirmModal(){
    setText('confirmTitle', currentLang === 'ar' ? "\u062A\u0623\u0643\u064A\u062F \u0627\u0644\u0637\u0644\u0628" : 'Confirm order');
    setText('confirmText', currentLang === 'ar' ? "\u0633\u064A\u062A\u0645 \u062A\u062B\u0628\u064A\u062A \u0627\u0644\u0637\u0644\u0628 \u062A\u0644\u0642\u0627\u0626\u064A\u0627\u064B \u062E\u0644\u0627\u0644 8 \u062B\u0648\u0627\u0646\u064D" : 'The order will be confirmed automatically in 8 seconds');
    setText('confirmSubtext', currentLang === 'ar' ? "\u064A\u0645\u0643\u0646\u0643 \u062A\u062B\u0628\u064A\u062A \u0627\u0644\u0637\u0644\u0628 \u0627\u0644\u0622\u0646 \u0623\u0648 \u0625\u0644\u063A\u0627\u0621\u0647 \u0642\u0628\u0644 \u0627\u0644\u0625\u0631\u0633\u0627\u0644." : 'You can confirm now or cancel before it is sent.');
    setText('cancelConfirmBtn', currentLang === 'ar' ? "\u0625\u0644\u063A\u0627\u0621 \u0627\u0644\u0637\u0644\u0628" : 'Cancel order');
    setText('confirmNowBtn', currentLang === 'ar' ? "\u062A\u062B\u0628\u064A\u062A \u0627\u0644\u0622\u0646" : 'Confirm now');
    setText('confirmCountdown', '8');
  }

  function startConfirmCountdown(){
    clearConfirmCountdown();
    confirmSecondsLeft = 8;
    updateConfirmCountdown();
    confirmCountdownTimer = setInterval(function(){
      confirmSecondsLeft -= 1;
      updateConfirmCountdown();
      if(confirmSecondsLeft <= 0) confirmOrderNow();
    }, 1000);
  }

  function updateConfirmCountdown(){
    setText('confirmCountdown', String(Math.max(confirmSecondsLeft, 0)));
    setText('confirmText', currentLang === 'ar' ? "\u0633\u064A\u062A\u0645 \u062A\u062B\u0628\u064A\u062A \u0627\u0644\u0637\u0644\u0628 \u062A\u0644\u0642\u0627\u0626\u064A\u0627\u064B \u062E\u0644\u0627\u0644 "+Math.max(confirmSecondsLeft, 0)+" \u062B\u0648\u0627\u0646\u064D" : 'The order will be confirmed automatically in '+Math.max(confirmSecondsLeft, 0)+' seconds');
  }

  function clearConfirmCountdown(){
    if(confirmCountdownTimer){ clearInterval(confirmCountdownTimer); confirmCountdownTimer = null; }
  }

  window.cancelConfirmOrder=function(){
    clearConfirmCountdown();
    pendingOrderPayload = null;
    closeOrderModal('confirmModal');
    openOrderModal('reviewModal');
  };

  window.confirmOrderNow=async function(){
    clearConfirmCountdown();
    if(!pendingOrderPayload) return;
    var payload = pendingOrderPayload;
    pendingOrderPayload = null;
    await sendOrderPayload(payload);
  };

  async function sendOrderPayload(payload){
    var btn=document.getElementById('confirmNowBtn');
    btn.disabled=true; btn.textContent=currentLang === 'ar' ? "\u062C\u0627\u0631 \u0627\u0644\u0625\u0631\u0633\u0627\u0644..." : 'Sending...';
    try{
      var result;
      if(ORDER_ENDPOINT){var response=await fetch(ORDER_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'omit',body:JSON.stringify(payload)});result=await response.json().catch(function(){return {};});if(!response.ok) throw new Error(result.message || 'ORDER_FAILED');}
      else{console.log('Order payload for Worker:',payload);result={order_number:'DEMO-'+Date.now().toString().slice(-5),total:totals().total};}
      var total=Number(result.total == null ? totals().total : result.total);
      cart.clear(); renderCart(); closeOrderModal('confirmModal'); closeOrderModal('reviewModal');
      setText('successTitle', currentLang === 'ar' ? "\u062A\u0645 \u0627\u0633\u062A\u0644\u0627\u0645 \u0637\u0644\u0628\u0643 \u0628\u0646\u062C\u0627\u062D" : 'Your order was received');
      document.getElementById('successDetails').innerHTML=currentLang === 'ar' ? "\u062A\u0645 \u0625\u0631\u0633\u0627\u0644 \u0637\u0644\u0628\u0643 \u0625\u0644\u0649 \u0627\u0644\u0643\u0627\u0634."+'<br>'+"\u0627\u0644\u0645\u062C\u0645\u0648\u0639"+': '+price(total)+' '+cur()+'<br>'+"\u064A\u0631\u062C\u0649 \u0645\u0631\u0627\u062C\u0639\u0629 \u0627\u0644\u0643\u0627\u0634 \u0644\u0644\u062A\u0623\u0643\u064A\u062F \u0648\u0627\u0644\u062F\u0641\u0639." : 'Your order was sent to the cashier.<br>Total: '+price(total)+' '+cur()+'<br>Please check with the cashier to confirm and pay.';
      setText('successCloseBtn', currentLang === 'ar' ? "\u062A\u0645" : 'Done'); openOrderModal('successModal');
    }catch(error){closeOrderModal('confirmModal'); openOrderModal('reviewModal'); showErr(error.message === 'RATE_LIMITED' ? (currentLang === 'ar' ? "\u062A\u0645 \u0625\u0631\u0633\u0627\u0644 \u0639\u062F\u0629 \u0637\u0644\u0628\u0627\u062A \u0645\u0646 \u0647\u0630\u0627 \u0627\u0644\u062C\u0647\u0627\u0632 \u062E\u0644\u0627\u0644 \u0648\u0642\u062A \u0642\u0635\u064A\u0631. \u064A\u0631\u062C\u0649 \u0645\u0631\u0627\u062C\u0639\u0629 \u0627\u0644\u0643\u0627\u0634 \u0644\u0625\u0643\u0645\u0627\u0644 \u0627\u0644\u0637\u0644\u0628." : 'Several orders were sent from this device recently. Please check with the cashier.') : (currentLang === 'ar' ? "\u062A\u0639\u0630\u0631 \u0625\u0631\u0633\u0627\u0644 \u0627\u0644\u0637\u0644\u0628. \u062D\u0627\u0648\u0644 \u0645\u0631\u0629 \u0623\u062E\u0631\u0649." : 'Could not send the order. Please try again.'));}
    finally{btn.disabled=false;btn.textContent=currentLang === 'ar' ? "\u062A\u062B\u0628\u064A\u062A \u0627\u0644\u0622\u0646" : 'Confirm now';}
  };


  var oldToggleLang = window.toggleLang;
  window.toggleLang=function(){oldToggleLang();renderCart();};
  prepareMenuData();
  renderNav();
  renderMenu();
  renderCart();
})();
</script>

</body>
